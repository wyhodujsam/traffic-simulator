server.port=8086
spring.application.name=traffic-simulator
logging.level.org.springframework.web.socket=DEBUG
osm.overpass.urls=https://overpass-api.de,https://overpass.private.coffee,https://overpass.kumi.systems
osm.overpass.connect-timeout-ms=10000
osm.overpass.read-timeout-ms=45000
claude.cli.path=claude
claude.cli.timeout-seconds=30
# Phase 24: osm2streets Rust binary (Path B subprocess - 24-RESEARCH.md section 5)
osm2streets.binary-path=backend/bin/osm2streets-cli-linux-x64
osm2streets.timeout-seconds=30
# Phase 25 D-14: replay logger (disabled by default per REPLAY-03; auto-enabled by RUN_FOR_TICKS)
simulator.replay.enabled=false
simulator.replay.directory=target/replays
